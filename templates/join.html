{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-sm-10 col-md-6">
    <div class="text-center mb-4">
      <div style="font-size:4rem">🍺</div>
      <h1 class="fw-bold">Pub Crawl</h1>
      <p class="text-muted">Enter your details to join the crawl</p>
    </div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="POST" action="/join">
          <div class="mb-3">
            <label class="form-label fw-semibold">Your Name</label>
            <input type="text" name="name" class="form-control form-control-lg"
                   placeholder="e.g. Dave" required autofocus autocomplete="off">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Join Code</label>
            <input type="text" name="code" class="form-control form-control-lg"
                   placeholder="Ask the organiser" required autocomplete="off">
          </div>
          <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold">
            Join the Crawl 🍻
          </button>
        </form>
      </div>
    </div>

    <p class="text-center mt-4 text-muted small">
      <a href="/admin" class="text-muted">Organiser? Admin panel →</a>
    </p>
  </div>
</div>
{% endblock %}
