<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Pub Crawl</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

  {% if session.player_id %}
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 fw-bold">🍺 Pub Crawl</span>
    <span class="text-white-50 small">{{ session.player_name }}</span>
  </nav>
  {% endif %}

  <div class="container mt-3 pb-4">
    {% block content %}{% endblock %}
  </div>

  {% if session.player_id %}
  <nav class="bottom-nav navbar navbar-dark bg-dark">
    <div class="container-fluid justify-content-around">
      <a href="/score" class="bottom-nav-link {% if request.path == '/score' %}active{% endif %}">
        <div>🍺</div><div>Score</div>
      </a>
      <a href="/leaderboard" class="bottom-nav-link {% if request.path == '/leaderboard' %}active{% endif %}">
        <div>🏆</div><div>Board</div>
      </a>
      <a href="/map" class="bottom-nav-link {% if request.path == '/map' %}active{% endif %}">
        <div>📍</div><div>Map</div>
      </a>
    </div>
  </nav>
  {% endif %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
