services:
  - type: web
    name: pub-crawl
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pub-crawl-db
          property: connectionString

databases:
  - name: pub-crawl-db
    plan: free
